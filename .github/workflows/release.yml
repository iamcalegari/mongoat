# Release workflow — SEPARADO do ci.yml (testes) e docs.yml (Pages), conforme
# D-04. Publica no npm com provenance (atestacao de origem via OIDC do GitHub
# Actions, o mesmo padrao id-token:write ja usado em docs.yml).
#
# Fluxo (changesets): num push para `main` com changesets pendentes, a
# changesets/action abre/atualiza um "Version Packages" PR (bump + consumo dos
# changesets). Quando esse PR e mergeado (ou quando ha versoes nao-publicadas),
# a action roda `npm run release` (= `changeset publish`) e publica.
#
# Gate (D-03): o job usa o Environment `npm-publish`, que tem um required
# reviewer (o autor). Isso pausa a PUBLICACAO ate aprovacao humana explicita —
# a primeira release (1.1.0, irreversivel) exige 1 clique. Para tornar as
# releases seguintes totalmente zero-clique, basta remover o required reviewer
# do Environment depois da 1a release (research Pattern 3, estrategia (a)).
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # habilita `npm publish --provenance` via OIDC (D-04)

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish # gate humano (required reviewer) — D-03
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm run check:package

      - uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
