# Release workflow — SEPARADO do ci.yml (testes) e docs.yml (Pages).
# Publica no npm com provenance (atestacao de origem via OIDC do GitHub
# Actions, o mesmo padrao id-token:write ja usado em docs.yml).
#
# Fluxo (changesets): num push para `main` com changesets pendentes, a
# changesets/action abre/atualiza um "Version Packages" PR (bump + consumo dos
# changesets). Quando esse PR e mergeado (ou quando ha versoes nao-publicadas),
# a action roda `npm run release` (= `changeset publish`) e publica.
#
# Gate: o job usa o Environment `npm-publish`, que tem um required
# reviewer (o autor). Isso pausa a PUBLICACAO ate aprovacao humana explicita —
# a primeira release (1.1.0, irreversivel) exige 1 clique. Para tornar as
# releases seguintes totalmente zero-clique, basta remover o required reviewer
# do Environment depois da 1a release.
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # habilita `npm publish --provenance` via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish # gate humano (required reviewer)
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build

      - run: npm test

      - run: npm run check:package

      # A referencia abaixo aponta para um commit fixo, nao para a tag `v1` —
      # essa tag e um branch mantido pelos autores, entao seu topo pode ser
      # reescrito sem nenhum aviso de versao. E a unica action deste arquivo
      # que roda dentro do job que segura a credencial de publicacao no npm.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
