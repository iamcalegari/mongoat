# Release workflow — SEPARADO do ci.yml (testes) e docs.yml (Pages).
# Publica no npm com provenance (atestacao de origem via OIDC do GitHub
# Actions, o mesmo padrao id-token:write ja usado em docs.yml).
#
# Fluxo (changesets): num push para `main` com changesets pendentes, a
# changesets/action abre/atualiza um "Version Packages" PR (bump + consumo dos
# changesets). Quando esse PR e mergeado (ou quando ha versoes nao-publicadas),
# a action roda `npm run release` (= `changeset publish`) e publica.
#
# Gate: o job de publicacao usa o Environment `npm-publish`, que tem um
# required reviewer (o autor). Isso pausa a PUBLICACAO ate aprovacao humana
# explicita — a primeira release (1.1.0, irreversivel) exige 1 clique. Para
# tornar as releases seguintes totalmente zero-clique, basta remover o
# required reviewer do Environment depois da 1a release.
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build

      - run: npm test

      - run: npm run check:package

  release:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish # gate humano (required reviewer)
    permissions:
      contents: write
      pull-requests: write
      id-token: write # habilita `npm publish --provenance` via OIDC
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      # Uma instalacao comum executa codigo de terceiro escrito nos hooks de
      # instalacao das dependencias. Este e o job que segura a credencial de
      # publicacao no npm e a identidade que assina a proveniencia — codigo de
      # dependencia nao roda aqui.
      - run: npm ci --ignore-scripts

      - run: npm run build

      # A referencia abaixo aponta para um commit fixo, nao para a tag `v1` —
      # essa tag e um branch mantido pelos autores, entao seu topo pode ser
      # reescrito sem nenhum aviso de versao. E a unica action deste arquivo
      # que roda dentro do job que segura a credencial de publicacao no npm.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
